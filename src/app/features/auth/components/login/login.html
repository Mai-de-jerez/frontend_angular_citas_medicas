<div class="login-container">
  <div class="login-card">
    <h1 class="login-title">Iniciar sesión</h1>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="tu@email.com"
        />
        @if (form.get('email')?.invalid && form.get('email')?.touched) {
          <span class="error">El email no es válido</span>
        }
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
        />
        @if (form.get('password')?.invalid && form.get('password')?.touched) {
          <span class="error">Mínimo 8 caracteres</span>
        }
      </div>

      <button type="submit" [disabled]="loadingService.isLoading()">
        {{ loadingService.isLoading() ? 'Cargando...' : 'Entrar' }}
      </button>

      <div class="links">
        <a routerLink="/auth/recuperar-password">¿Olvidaste tu contraseña?</a>
        <a routerLink="/auth/register">¿No tienes cuenta? Regístrate</a>
      </div>

    </form>
  </div>
</div>
