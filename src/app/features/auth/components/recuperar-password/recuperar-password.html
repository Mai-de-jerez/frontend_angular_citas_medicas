<div class="auth-container">
  <div class="auth-card">
    <h1 class="auth-title">Recuperar contraseña</h1>
    <p class="auth-subtitle">Introduce tu email y te enviaremos un enlace para restablecer tu contraseña.</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" autocomplete="off">
      <div class="form-group">
        <label for="email">Email</label>
        <input 
          id="email" 
          type="email" 
          formControlName="email" 
          placeholder="tu@email.com" 
        />
        @if (form.get('email')?.touched) {
          @if (form.get('email')?.hasError('required')) {
            <span class="error">El correo es obligatorio</span>
          } @else if (form.get('email')?.hasError('email')) {
            <span class="error">El formato del email no es válido</span>
          }
        }
      </div>

      <div class="form-actions">
        <button type="button" class="btn-cancelar" routerLink="/auth/login">Volver</button>
        <button type="submit" [disabled]="loadingService.isLoading()">
          {{ loadingService.isLoading() ? 'Enviando...' : 'Enviar enlace' }}
        </button>
      </div>
    </form>
  </div>
</div>
