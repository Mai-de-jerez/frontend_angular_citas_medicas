<nav class="navbar">
  <a routerLink="/" class="navbar-brand">Citas Médicas</a>

  <button class="hamburger" (click)="toggleMenu()" [class.abierto]="menuAbierto">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <ul class="navbar-nav" [class.abierto]="menuAbierto">

    <li class="nav-item">
      <a routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}" class="nav-link" (click)="cerrarMenu()">Inicio</a>
    </li>

    @if (!authService.isLogged()) {
      <li class="nav-item">
        <a routerLink="/auth/login" routerLinkActive="active-link" class="nav-link" (click)="cerrarMenu()">Login</a>
      </li>
    }

    @if (authService.isLogged()) {

      @if (authService.isAdmin()) {
        <li class="nav-item">
          <a routerLink="/admin/dashboard" routerLinkActive="active-link" class="nav-link" (click)="cerrarMenu()">Panel Admin</a>
        </li>
      }

      @if (authService.isMedico() || authService.isPaciente()) {
        <li class="nav-item">
          <a routerLink="/mis-citas" routerLinkActive="active-link" class="nav-link" (click)="cerrarMenu()">Mis Citas</a>
        </li>
        <li class="nav-item">
          <a routerLink="/mi-perfil" routerLinkActive="active-link" class="nav-link" (click)="cerrarMenu()">Mi Perfil</a>
        </li>
      }

      <li class="nav-item">
        <a class="nav-link nav-link-logout" (click)="onLogout()" style="cursor: pointer;">Logout</a>
      </li>

    }

  </ul>
</nav>
